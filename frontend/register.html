<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MyWeb Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 400px;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        input.error {
            border-color: #dc3545;
        }

        .error-message {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40,167,69,0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .password-strength {
            margin-top: 5px;
            font-size: 12px;
        }

        .strength-weak { color: #dc3545; }
        .strength-medium { color: #ffc107; }
        .strength-strong { color: #28a745; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📝 Register</h2>
        
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Choose a username" autocomplete="username">
            <div class="error-message" id="usernameError"></div>
        </div>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
            <div class="error-message" id="emailError"></div>
        </div>
        
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create a password" autocomplete="new-password">
            <div class="password-strength" id="passwordStrength"></div>
            <div class="error-message" id="passwordError"></div>
        </div>
        
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm your password" autocomplete="off">
            <div class="error-message" id="confirmError"></div>
        </div>
        
        <button id="registerBtn" onclick="register()">Register</button>
        
        <div id="result" class="result"></div>
        
        <div class="login-link">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        // Real-time validation
        document.getElementById('username').addEventListener('input', validateUsername);
        document.getElementById('email').addEventListener('input', validateEmail);
        document.getElementById('password').addEventListener('input', function() {
            validatePassword();
            checkPasswordMatch();
        });
        document.getElementById('confirmPassword').addEventListener('input', checkPasswordMatch);

        function validateUsername() {
            const username = document.getElementById('username').value.trim();
            const errorDiv = document.getElementById('usernameError');
            const input = document.getElementById('username');
            
            if (username.length < 3) {
                errorDiv.textContent = 'Username must be at least 3 characters';
                errorDiv.style.display = 'block';
                input.classList.add('error');
                return false;
            } else if (username.length > 50) {
                errorDiv.textContent = 'Username must be less than 50 characters';
                errorDiv.style.display = 'block';
                input.classList.add('error');
                return false;
            } else if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                errorDiv.textContent = 'Username can only contain letters, numbers, and underscore';
                errorDiv.style.display = 'block';
                input.classList.add('error');
                return false;
            } else {
                errorDiv.style.display = 'none';
                input.classList.remove('error');
                return true;
            }
        }

        function validateEmail() {
            const email = document.getElementById('email').value.trim();
            const errorDiv = document.getElementById('emailError');
            const input = document.getElementById('email');
            const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
            
            if (!email) {
                errorDiv.textContent = 'Email is required';
                errorDiv.style.display = 'block';
                input.classList.add('error');
                return false;
            } else if (!emailRegex.test(email)) {
                errorDiv.textContent = 'Please enter a valid email address';
                errorDiv.style.display = 'block';
                input.classList.add('error');
                return false;
            } else {
                errorDiv.style.display = 'none';
                input.classList.remove('error');
                return true;
            }
        }

        function validatePassword() {
            const password = document.getElementById('password').value;
            const strengthDiv = document.getElementById('passwordStrength');
            const errorDiv = document.getElementById('passwordError');
            const input = document.getElementById('password');
            
            if (password.length === 0) {
                strengthDiv.innerHTML = '';
                errorDiv.style.display = 'none';
                input.classList.remove('error');
                return false;
            }
            
            // ตรวจสอบความแข็งแรงของรหัสผ่าน
            let strength = 0;
            let messages = [];
            
            if (password.length >= 8) strength++;
            else messages.push('At least 8 characters');
            
            if (/[a-z]/.test(password)) strength++;
            else messages.push('Lowercase letter');
            
            if (/[A-Z]/.test(password)) strength++;
            else messages.push('Uppercase letter');
            
            if (/[0-9]/.test(password)) strength++;
            else messages.push('Number');
            
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            else messages.push('Special character');
            
            if (strength <= 2) {
                strengthDiv.innerHTML = `<span class="strength-weak">🔴 Weak: ${messages.join(', ')}</span>`;
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Password is too weak';
                input.classList.add('error');
                return false;
            } else if (strength <= 4) {
                strengthDiv.innerHTML = '<span class="strength-medium">🟡 Medium: Good password</span>';
                errorDiv.style.display = 'none';
                input.classList.remove('error');
                return true;
            } else {
                strengthDiv.innerHTML = '<span class="strength-strong">🟢 Strong: Excellent password!</span>';
                errorDiv.style.display = 'none';
                input.classList.remove('error');
                return true;
            }
        }

        function checkPasswordMatch() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('confirmError');
            const input = document.getElementById('confirmPassword');
            
            if (confirm === '') {
                errorDiv.style.display = 'none';
                input.classList.remove('error');
                return false;
            }
            
            if (password !== confirm) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                input.classList.add('error');
                return false;
            } else {
                errorDiv.style.display = 'none';
                input.classList.remove('error');
                return true;
            }
        }

        async function register() {
            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const resultDiv = document.getElementById("result");
            const registerBtn = document.getElementById("registerBtn");
            
            // Validate all fields
            const isUsernameValid = validateUsername();
            const isEmailValid = validateEmail();
            const isPasswordValid = validatePassword();
            const isMatch = checkPasswordMatch();
            
            if (!isUsernameValid || !isEmailValid || !isPasswordValid || !isMatch) {
                showResult("Please fix the errors above before registering", "error");
                return;
            }
            
            // แสดง loading state
            const originalText = registerBtn.innerHTML;
            registerBtn.innerHTML = '<span class="loading"></span> Registering...';
            registerBtn.disabled = true;
            
            try {
                const response = await fetch("http://127.0.0.1:8000/users/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (response.status === 200 || response.status === 201) {
                    showResult("✅ Registration successful! Redirecting to login...", "success");
                    
                    // Clear form
                    document.getElementById("username").value = "";
                    document.getElementById("email").value = "";
                    document.getElementById("password").value = "";
                    document.getElementById("confirmPassword").value = "";
                    
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 2000);
                } else {
                    const errorMsg = data.detail || data.message || "Registration failed";
                    showResult(`❌ ${errorMsg}`, "error");
                }
            } catch (error) {
                console.error("Registration error:", error);
                showResult("❌ Connection error. Please check if server is running.", "error");
            } finally {
                // คืนค่า button
                registerBtn.innerHTML = originalText;
                registerBtn.disabled = false;
            }
        }
        
        function showResult(message, type) {
            const resultDiv = document.getElementById("result");
            resultDiv.textContent = message;
            resultDiv.className = `result ${type}`;
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                if (resultDiv.className === `result ${type}`) {
                    resultDiv.style.display = 'none';
                    resultDiv.style.display = '';
                }
            }, 5000);
        }
        
        // Enter key support
        document.getElementById('confirmPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                register();
            }
        });
        
        // Check if already logged in
        const token = localStorage.getItem("access_token");
        if (token) {
            fetch("http://127.0.0.1:8000/admin-auth/me", {
                headers: { "Authorization": `Bearer ${token}` }
            }).then(res => {
                if (res.ok) {
                    window.location.href = "/admin";
                }
            });
        }
    </script>
</body>
</html>
