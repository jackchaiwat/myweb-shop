<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyWeb Shop - ร้านค้าออนไลน์</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .nav a {
            color: #4a5568;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .nav a:hover {
            background: #667eea;
            color: white;
        }

        #logoutBtn {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
        }

        #logoutBtn:hover {
            background: #dc3545;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 3rem;
            margin-bottom: 3rem;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .product-image-container {
            position: relative;
            background: #f8f9fa;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.3s;
            background: white;
            padding: 10px;
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #2d3748;
        }

        .product-category {
            font-size: 0.85rem;
            color: #a0aec0;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .product-price {
            font-size: 1.8rem;
            font-weight: bold;
            color: #667eea;
            margin: 0.8rem 0;
        }

        .product-price small {
            font-size: 0.9rem;
            font-weight: normal;
            color: #a0aec0;
        }

        .product-stock {
            color: #48bb78;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .product-stock.out-of-stock {
            color: #f56565;
        }

        .btn-add-cart {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add-cart:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .btn-add-cart:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            gap: 1rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-container {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.success { border-left: 4px solid #48bb78; }
        .toast.error { border-left: 4px solid #f56565; }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            .hero h1 { font-size: 1.8rem; }
            .container { padding: 0 1rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo" onclick="window.location.href='products.html'">🛍️ MyWeb Shop</div>
            <div class="nav">
                <span class="user-info" id="userInfo">Loading...</span>
                <a href="products.html">🏠 Home</a>
                <a href="#" id="logoutBtn">🚪 Logout</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="hero">
            <h1>✨ Welcome to MyWeb Shop</h1>
            <p>Discover amazing products at the best prices</p>
        </div>

        <div id="products-container" class="products-grid">
            <div class="loading-container">
                <div class="spinner"></div>
                <div class="loading-text">Loading products...</div>
            </div>
        </div>
    </div>

    <script>
        // ✅ แก้ไข: ใช้ relative path แทน localhost
        const API_BASE = "";  // ใช้ relative path เชื่อมต่อกับ domain เดียวกัน
        const token = localStorage.getItem("access_token");

        if (!token) {
            showToast("Please login first", "error");
            setTimeout(() => window.location.href = "login.html", 1500);
        }

        // แสดงชื่อผู้ใช้
        const userStr = localStorage.getItem("user");
        if (userStr) {
            try {
                const user = JSON.parse(userStr);
                document.getElementById("userInfo").innerHTML = `👋 ${user.username}`;
            } catch(e) {}
        }

        async function loadProducts() {
            const container = document.getElementById("products-container");
            
            try {
                // ✅ ใช้ relative path
                const response = await fetch(`/products/`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                
                if (!response.ok) {
                    if (response.status === 401) {
                        localStorage.removeItem("access_token");
                        localStorage.removeItem("user");
                        showToast("Session expired", "error");
                        setTimeout(() => window.location.href = "login.html", 1500);
                        return;
                    }
                    throw new Error("Failed to load products");
                }
                
                const products = await response.json();
                displayProducts(products);
                
            } catch (error) {
                console.error("Error:", error);
                container.innerHTML = `
                    <div class="error-container">
                        <div style="font-size: 3rem;">😢</div>
                        <h3>Cannot connect to server</h3>
                        <p>Please try again later</p>
                        <button onclick="loadProducts()" style="margin-top: 1rem; padding: 0.5rem 1rem; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer;">Retry</button>
                    </div>
                `;
            }
        }

        function displayProducts(products) {
            const container = document.getElementById("products-container");
            
            if (!products || products.length === 0) {
                container.innerHTML = `<div class="error-container"><div style="font-size: 3rem;">📦</div><h3>No products yet</h3></div>`;
                return;
            }
            
            container.innerHTML = products.map(product => {
                // ✅ แก้ไข URL รูปให้ถูกต้อง
                let imageUrl = 'https://via.placeholder.com/300x200?text=No+Image';
                
                if (product.image) {
                    // ถ้า URL ขึ้นต้นด้วย / ให้ใช้ relative path
                    if (product.image.startsWith('/')) {
                        imageUrl = product.image;
                    } 
                    // ถ้า URL ขึ้นต้นด้วย http
                    else if (product.image.startsWith('http')) {
                        imageUrl = product.image;
                    }
                    // ถ้าเป็น relative path
                    else {
                        imageUrl = '/' + product.image;
                    }
                }
                
                return `
                <div class="product-card">
                    <div class="product-image-container">
                        <img src="${imageUrl}" 
                             class="product-image" 
                             alt="${escapeHtml(product.name)}"
                             onerror="this.src='https://via.placeholder.com/300x200?text=Image+Not+Found'; this.onerror=null;">
                        <div class="product-badge">${product.stock > 0 ? 'In Stock' : 'Out of Stock'}</div>
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">${escapeHtml(product.name)}</h3>
                        <div class="product-category">📁 ${product.category?.name || 'General'}</div>
                        <div class="product-price">
                            ฿${product.price.toLocaleString()}
                            <small>THB</small>
                        </div>
                        <div class="product-stock ${product.stock === 0 ? 'out-of-stock' : ''}">
                            ${product.stock > 0 ? `✅ In Stock (${product.stock})` : '❌ Out of Stock'}
                        </div>
                        <button class="btn-add-cart" 
                                onclick="addToCart(${product.id}, ${product.stock})"
                                ${product.stock === 0 ? 'disabled' : ''}>
                            🛒 ${product.stock > 0 ? 'Add to Cart' : 'Sold Out'}
                        </button>
                    </div>
                </div>
            `}).join('');
        }

        function showToast(message, type) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span><span>${message}</span>`;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }

        async function addToCart(productId, stock) {
            if (stock <= 0) {
                showToast("Out of stock!", "error");
                return;
            }
            showToast("Added to cart! 🎉", "success");
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById("logoutBtn").addEventListener("click", (e) => {
            e.preventDefault();
            localStorage.removeItem("access_token");
            localStorage.removeItem("user");
            showToast("Logged out", "success");
            setTimeout(() => window.location.href = "login.html", 500);
        });

        loadProducts();
    </script>
</body>
</html>
