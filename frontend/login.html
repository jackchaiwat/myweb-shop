<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MyWeb Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 400px;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Login</h2>
        
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
        </div>
        
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
        </div>
        
        <button id="loginBtn" onclick="login()">Login</button>
        
        <div id="result" class="result"></div>
        
        <div class="register-link">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>

    <script>
        // API URL - ใช้ base URL ของ backend
        const API_BASE = "http://127.0.0.1:8000";

        // Enter key support
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
        
        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        async function login() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const resultDiv = document.getElementById("result");
            const loginBtn = document.getElementById("loginBtn");
            
            // ตรวจสอบว่ากรอกข้อมูลครบหรือไม่
            if (!username || !password) {
                showResult("Please enter both username and password", "error");
                return;
            }
            
            // แสดง loading state
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<span class="loading"></span> Logging in...';
            loginBtn.disabled = true;
            
            try {
                // ใช้ endpoint /users/login (สำหรับ user ทั่วไป)
                // หรือ /admin-auth/login (สำหรับ admin)
                const response = await fetch(`${API_BASE}/users/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.access_token) {
                    // บันทึก token
                    localStorage.setItem("access_token", data.access_token);
                    if (data.user) {
                        localStorage.setItem("user", JSON.stringify(data.user));
                    }
                    
                    showResult(`✅ Login success! Welcome ${username}`, "success");
                    
                    // เปลี่ยนหน้าไปที่ products
                    setTimeout(() => {
                        window.location.href = "products.html";
                    }, 1000);
                } else {
                    const errorMsg = data.detail || data.message || "Invalid username or password";
                    showResult(`❌ ${errorMsg}`, "error");
                }
            } catch (error) {
                console.error("Login error:", error);
                showResult("❌ Connection error. Please check if server is running at " + API_BASE, "error");
            } finally {
                // คืนค่า button
                loginBtn.innerHTML = originalText;
                loginBtn.disabled = false;
            }
        }
        
        function showResult(message, type) {
            const resultDiv = document.getElementById("result");
            resultDiv.textContent = message;
            resultDiv.className = `result ${type}`;
            
            // ซ่อนข้อความหลังจาก 3 วินาที
            setTimeout(() => {
                resultDiv.style.display = 'none';
                resultDiv.style.display = '';
            }, 3000);
        }
        
        // ตรวจสอบว่าล็อกอินแล้วหรือยัง
        const token = localStorage.getItem("access_token");
        if (token) {
            // ถ้ามี token ให้ไปที่ products
            window.location.href = "products.html";
        }
    </script>
</body>
</html>
